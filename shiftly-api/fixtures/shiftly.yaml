# ─── Missions Accueil ────────────────────────────────────────────────────────
App\Entity\Mission:
  # OUVERTURE
  m_acc_ouv_1:
    zone:     "@zone_accueil"
    texte:    "Allumer les écrans d'affichage et le système de scoring"
    type:     "OUVERTURE"
    priorite: "vitale"
    ordre:    1
  m_acc_ouv_2:
    zone:     "@zone_accueil"
    texte:    "Vérifier la caisse et préparer le fond de caisse"
    type:     "OUVERTURE"
    priorite: "vitale"
    ordre:    2
  m_acc_ouv_3:
    zone:     "@zone_accueil"
    texte:    "Préparer le stock de chaussures (tri + désinfection)"
    type:     "OUVERTURE"
    priorite: "important"
    ordre:    3
  m_acc_ouv_4:
    zone:     "@zone_accueil"
    texte:    "Vérifier les réservations du jour sur le logiciel"
    type:     "OUVERTURE"
    priorite: "important"
    ordre:    4

  # SERVICE
  m_acc_svc_1:
    zone:     "@zone_accueil"
    texte:    "Accueillir les groupes et attribuer les pistes"
    type:     "SERVICE"
    priorite: "vitale"
    ordre:    1
  m_acc_svc_2:
    zone:     "@zone_accueil"
    texte:    "Gérer les files d'attente et les walk-ins"
    type:     "SERVICE"
    priorite: "important"
    ordre:    2
  m_acc_svc_3:
    zone:     "@zone_accueil"
    texte:    "Distribuer et récupérer les chaussures"
    type:     "SERVICE"
    priorite: "vitale"
    ordre:    3
  m_acc_svc_4:
    zone:     "@zone_accueil"
    texte:    "Prendre les paiements et les encaissements"
    type:     "SERVICE"
    priorite: "vitale"
    ordre:    4

  # FERMETURE
  m_acc_ferm_1:
    zone:     "@zone_accueil"
    texte:    "Faire le compte de caisse et solder les Z"
    type:     "FERMETURE"
    priorite: "vitale"
    ordre:    1
  m_acc_ferm_2:
    zone:     "@zone_accueil"
    texte:    "Ranger et désinfecter toutes les chaussures"
    type:     "FERMETURE"
    priorite: "important"
    ordre:    2
  m_acc_ferm_3:
    zone:     "@zone_accueil"
    texte:    "Éteindre les écrans et verrouiller la caisse"
    type:     "FERMETURE"
    priorite: "vitale"
    ordre:    3

