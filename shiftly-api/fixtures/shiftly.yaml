# ─── Tutoriels ───────────────────────────────────────────────────────────────
App\Entity\Tutoriel:
  tuto_reservation:
    centre:  "@centre_fgc"
    titre:   "Prise en main du logiciel de réservation"
    zone:    "@zone_accueil"
    niveau:  "debutant"
    dureMin: 15
    contenu:
      - { type: "intro", text: "Ce tutoriel guide les nouveaux membres à travers les étapes essentielles du logiciel de réservation." }
      - { type: "step", number: 1, title: "Se connecter", text: "Ouvrez le navigateur, allez sur l'interface admin. Utilisez vos identifiants fournis par le manager." }
      - { type: "step", number: 2, title: "Créer une réservation", text: "Cliquez sur 'Nouvelle réservation', sélectionnez date, heure et nombre de joueurs." }
      - { type: "step", number: 3, title: "Attribuer une piste", text: "Le système propose une piste disponible. Vous pouvez la modifier si nécessaire." }
      - { type: "tip", text: "En cas de conflit de réservation, privilégiez toujours le client sur place." }

  tuto_cocktails:
    centre:  "@centre_fgc"
    titre:   "Préparer les cocktails signature maison"
    zone:    "@zone_bar"
    niveau:  "intermediaire"
    dureMin: 20
    contenu:
      - { type: "intro", text: "Les cocktails maison sont la signature de l'établissement. Voici les recettes et techniques de service." }
      - { type: "step", number: 1, title: "Ingrédients", text: "Récupérez les ingrédients dans le frigo sous le comptoir. Vérifiez toujours les dates." }
      - { type: "step", number: 2, title: "Préparation", text: "Utilisez le shaker pour les cocktails frappés. 3 glaçons minimum, secouer 10 secondes." }
      - { type: "step", number: 3, title: "Service", text: "Verser dans le verre approprié, garnir avec la tranche de citron ou la cerise selon la recette." }
      - { type: "tip", text: "Proposez systématiquement la version sans alcool à tout le groupe." }

  tuto_caisse:
    centre:  "@centre_fgc"
    titre:   "Procédure de clôture de caisse"
    zone:    "@zone_accueil"
    niveau:  "avance"
    dureMin: 25
    contenu:
      - { type: "intro", text: "La clôture de caisse est une étape critique. Toute erreur doit être signalée au manager." }
      - { type: "step", number: 1, title: "Imprimer le Z", text: "Depuis le logiciel de caisse, imprimez le rapport Z de fin de journée." }
      - { type: "step", number: 2, title: "Compter les espèces", text: "Comptez les billets et pièces par coupures. Notez le total sur la fiche de caisse." }
      - { type: "step", number: 3, title: "Rapprocher les totaux", text: "Comparez le total espèces + CB avec le Z. Écart > 5€ : appel manager obligatoire." }
      - { type: "tip", text: "Ne jamais laisser la caisse ouverte sans surveillance, même 30 secondes." }

  tuto_incidents:
    centre:  "@centre_fgc"
    titre:   "Signaler et gérer un incident"
    zone:    ~
    niveau:  "debutant"
    dureMin: 10
    contenu:
      - { type: "intro", text: "Tout incident doit être signalé immédiatement dans l'application Shiftly, même mineur." }
      - { type: "step", number: 1, title: "Ouvrir Shiftly", text: "Dans l'app, allez sur 'Service du Jour' → bouton orange '+ Signaler un incident'." }
      - { type: "step", number: 2, title: "Remplir le formulaire", text: "Décrivez clairement l'incident, choisissez la sévérité et la zone concernée." }
      - { type: "step", number: 3, title: "Prévenir le manager", text: "Pour les incidents 'haute' sévérité, prévenez oralement le manager en plus du signalement app." }
      - { type: "tip", text: "Un incident signalé rapidement = résolution 3 fois plus rapide en moyenne." }

